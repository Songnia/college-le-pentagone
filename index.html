<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Collège Polyvalent Bilingue Le Pentagone — Douala, Cameroun</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --foret: #0e2a1c;
  --vert: #174730;
  --vert-m: #1f5c3e;
  --vert-clair: #2e7d57;
  --or: #c5973a;
  --or-vif: #e4b255;
  --or-pale: #f0d899;
  --creme: #faf7f0;
  --creme2: #f3ede0;
  --blanc: #ffffff;
  --texte: #1a1a18;
  --gris: #5a5a52;
  --gris-clair: #9a9a90;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; font-size: 16px; }

body {
  font-family: 'DM Sans', sans-serif;
  color: var(--texte);
  background: var(--blanc);
  overflow-x: hidden;
}

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--foret); }
::-webkit-scrollbar-thumb { background: var(--or); border-radius: 3px; }

/* ════════════════════════════
   NAVBAR
════════════════════════════ */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
  background: rgba(14, 42, 28, 0.97);
  backdrop-filter: blur(16px);
  height: 76px;
  display: flex; align-items: center;
  padding: 0 4%;
  justify-content: space-between;
  border-bottom: 1px solid rgba(197,151,58,0.35);
  transition: box-shadow 0.3s;
}

nav.scrolled { box-shadow: 0 4px 40px rgba(0,0,0,0.5); }

.logo {
  display: flex; align-items: center; gap: 14px;
  text-decoration: none; flex-shrink: 0;
}

.logo-pentagon {
  position: relative; width: 46px; height: 46px;
  background: var(--or);
  clip-path: polygon(50% 0%, 100% 38%, 82% 100%, 18% 100%, 0% 38%);
  display: flex; align-items: center; justify-content: center;
}

.logo-pentagon::after {
  content: 'P';
  font-family: 'Cormorant Garamond', serif;
  font-size: 20px; font-weight: 700;
  color: var(--foret);
}

.logo-text { line-height: 1.2; }
.logo-text strong {
  display: block;
  font-family: 'Cormorant Garamond', serif;
  font-size: 16px; font-weight: 700; color: var(--blanc);
  letter-spacing: 0.3px;
}
.logo-text span {
  font-size: 10px; color: var(--or-vif);
  letter-spacing: 2px; text-transform: uppercase;
  font-weight: 500;
}

.nav-links {
  display: flex; gap: 30px; list-style: none; align-items: center;
}

.nav-links a {
  color: rgba(255,255,255,0.8); text-decoration: none;
  font-size: 12px; letter-spacing: 1.8px; text-transform: uppercase;
  font-weight: 500; transition: color 0.25s;
  position: relative; padding-bottom: 3px;
}

.nav-links a::after {
  content: ''; position: absolute; bottom: 0; left: 0;
  width: 0; height: 1.5px; background: var(--or);
  transition: width 0.3s;
}

.nav-links a:hover { color: var(--or-pale); }
.nav-links a:hover::after { width: 100%; }

.nav-cta {
  background: var(--or) !important;
  color: var(--foret) !important;
  padding: 9px 22px !important;
  border-radius: 2px !important;
  font-weight: 600 !important;
}
.nav-cta::after { display: none !important; }
.nav-cta:hover { background: var(--or-vif) !important; opacity: 1 !important; }

.nav-hamburger {
  display: none; flex-direction: column; gap: 5px;
  background: none; border: none; cursor: pointer; padding: 4px;
}
.nav-hamburger span {
  display: block; width: 24px; height: 2px;
  background: var(--or); transition: 0.3s;
}

/* ════════════════════════════
   HERO
════════════════════════════ */
#accueil {
  min-height: 100vh;
  background: var(--foret);
  display: flex; align-items: center;
  position: relative; overflow: hidden;
  padding-top: 76px;
}

.hero-bg {
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 80% 60% at 70% 40%, rgba(31,92,62,0.5) 0%, transparent 70%),
    radial-gradient(ellipse 50% 50% at 20% 80%, rgba(197,151,58,0.08) 0%, transparent 60%),
    linear-gradient(150deg, var(--foret) 0%, #0a1e12 60%, #0e2a1c 100%);
}

/* Geometric pentagon pattern */
.hero-grid {
  position: absolute; inset: 0;
  background-image:
    repeating-linear-gradient(45deg, rgba(197,151,58,0.04) 0px, rgba(197,151,58,0.04) 1px, transparent 1px, transparent 40px),
    repeating-linear-gradient(-45deg, rgba(197,151,58,0.04) 0px, rgba(197,151,58,0.04) 1px, transparent 1px, transparent 40px);
}

.hero-deco-penta {
  position: absolute;
  clip-path: polygon(50% 0%, 100% 38%, 82% 100%, 18% 100%, 0% 38%);
}
.hero-deco-penta.p1 {
  width: 700px; height: 700px;
  right: -120px; top: 50%; transform: translateY(-50%);
  background: linear-gradient(135deg, rgba(46,125,87,0.12), rgba(197,151,58,0.06));
  border: 1px solid rgba(197,151,58,0.1);
}
.hero-deco-penta.p2 {
  width: 380px; height: 380px;
  right: 80px; top: 10%;
  background: rgba(197,151,58,0.05);
}
.hero-deco-penta.p3 {
  width: 200px; height: 200px;
  left: 5%; bottom: 10%;
  background: rgba(197,151,58,0.06);
}

.hero-inner {
  position: relative; z-index: 2;
  max-width: 1300px; margin: 0 auto;
  padding: 60px 5%;
  display: grid; grid-template-columns: 1fr 1fr; gap: 60px; align-items: center;
}

.hero-left { animation: fadeLeft 1s ease 0.2s both; }

@keyframes fadeLeft {
  from { opacity: 0; transform: translateX(-40px); }
  to { opacity: 1; transform: translateX(0); }
}

@keyframes fadeRight {
  from { opacity: 0; transform: translateX(40px); }
  to { opacity: 1; transform: translateX(0); }
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}

.hero-label {
  display: inline-flex; align-items: center; gap: 12px;
  margin-bottom: 28px;
}
.hero-label::before {
  content: '';
  display: block; width: 40px; height: 1px;
  background: var(--or);
}
.hero-label span {
  font-size: 10px; letter-spacing: 3.5px; text-transform: uppercase;
  color: var(--or); font-weight: 600;
}

.hero-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(2.6rem, 5vw, 4.2rem);
  line-height: 1.08; font-weight: 700;
  color: var(--blanc);
  margin-bottom: 10px;
}

.hero-title em {
  font-style: italic; color: var(--or-vif);
}

.hero-title .school-name {
  display: block;
  font-size: clamp(1.3rem, 2.5vw, 2rem);
  font-weight: 400; color: rgba(255,255,255,0.5);
  letter-spacing: 1px; margin-bottom: 6px;
  font-style: normal;
  text-transform: uppercase; font-family: 'DM Sans', sans-serif;
  font-size: clamp(0.7rem, 1.2vw, 0.9rem);
  letter-spacing: 3px;
}

.hero-sub {
  font-size: clamp(0.95rem, 1.5vw, 1.1rem);
  color: rgba(255,255,255,0.62); line-height: 1.8;
  margin: 24px 0 44px; font-weight: 300; max-width: 480px;
}

.hero-btns {
  display: flex; gap: 14px; flex-wrap: wrap;
  animation: fadeUp 1s ease 0.9s both;
}

.btn {
  display: inline-flex; align-items: center; gap: 10px;
  padding: 14px 32px; text-decoration: none;
  font-size: 12px; letter-spacing: 2px; text-transform: uppercase;
  font-weight: 600; border-radius: 2px;
  transition: all 0.3s; cursor: pointer; border: none;
}

.btn-gold {
  background: var(--or); color: var(--foret);
  box-shadow: 0 6px 24px rgba(197,151,58,0.4);
}
.btn-gold:hover { background: var(--or-vif); transform: translateY(-2px); box-shadow: 0 10px 36px rgba(197,151,58,0.5); }

.btn-outline {
  border: 1.5px solid rgba(255,255,255,0.3); color: rgba(255,255,255,0.9);
}
.btn-outline:hover { border-color: var(--or); color: var(--or); transform: translateY(-2px); }

.hero-stats {
  display: flex; gap: 40px; margin-top: 60px;
  padding-top: 40px; border-top: 1px solid rgba(197,151,58,0.2);
  animation: fadeUp 1s ease 1.1s both; flex-wrap: wrap;
}

.stat { text-align: left; }
.stat-num {
  font-family: 'Cormorant Garamond', serif;
  font-size: 3rem; font-weight: 700;
  color: var(--or); line-height: 1; display: block;
}
.stat-num sup { font-size: 1.5rem; }
.stat-label {
  font-size: 10px; letter-spacing: 2.5px; text-transform: uppercase;
  color: rgba(255,255,255,0.45); margin-top: 5px; display: block;
}

/* Hero right: visual card */
.hero-right {
  animation: fadeRight 1s ease 0.4s both;
  position: relative;
}

.hero-card {
  background: linear-gradient(145deg, rgba(31,92,62,0.6), rgba(14,42,28,0.9));
  border: 1px solid rgba(197,151,58,0.2);
  border-radius: 6px; padding: 44px 40px;
  backdrop-filter: blur(10px);
  position: relative; overflow: hidden;
}

.hero-card::before {
  content: '';
  position: absolute; top: -40px; right: -40px;
  width: 160px; height: 160px;
  background: rgba(197,151,58,0.08);
  clip-path: polygon(50% 0%, 100% 38%, 82% 100%, 18% 100%, 0% 38%);
}

.school-photo-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 28px;
}

.school-photo {
  border-radius: 4px; overflow: hidden;
  aspect-ratio: 4/3;
  position: relative;
}

.school-photo.tall { grid-row: 1/3; aspect-ratio: auto; }

.photo-scene {
  width: 100%; height: 100%; min-height: 120px;
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 8px;
  position: relative; overflow: hidden;
}

/* Rich photo placeholders with scenery */
.ps-classe {
  background: linear-gradient(160deg, #1a4d35 0%, #0e3020 100%);
}
.ps-labo {
  background: linear-gradient(160deg, #2e5a7a 0%, #1a3a50 100%);
}
.ps-sport {
  background: linear-gradient(160deg, #4a7c3a 0%, #2a5020 100%);
}
.ps-biblio {
  background: linear-gradient(160deg, #5a3a6a 0%, #3a1f4a 100%);
}

.photo-scene svg { opacity: 0.7; }

.photo-caption {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: linear-gradient(to top, rgba(0,0,0,0.7), transparent);
  padding: 16px 12px 8px;
  font-size: 9px; letter-spacing: 2px; text-transform: uppercase;
  color: rgba(255,255,255,0.8); font-weight: 600;
}

.hero-card-bottom {
  display: flex; align-items: center; gap: 16px;
  padding-top: 20px; border-top: 1px solid rgba(197,151,58,0.15);
}

.accreditation-badge {
  width: 48px; height: 48px;
  background: var(--or);
  clip-path: polygon(50% 0%, 100% 38%, 82% 100%, 18% 100%, 0% 38%);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}

.accreditation-badge span {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 700; font-size: 14px; color: var(--foret);
}

.hero-card-bottom p {
  font-size: 0.82rem; color: rgba(255,255,255,0.65); line-height: 1.5;
}
.hero-card-bottom strong {
  color: var(--or-pale); font-size: 0.9rem;
}

/* ════════════════════════════
   SECTION COMMONS
════════════════════════════ */
.section { padding: 110px 5%; }

.section-inner {
  max-width: 1280px; margin: 0 auto;
}

.tag {
  display: inline-flex; align-items: center; gap: 10px;
  margin-bottom: 18px;
}
.tag::before {
  content: '';
  display: block; width: 28px; height: 2px;
  background: var(--or);
}
.tag span {
  font-size: 10px; letter-spacing: 3.5px; text-transform: uppercase;
  color: var(--or); font-weight: 600;
}

.section-h {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(2rem, 3.5vw, 3rem);
  font-weight: 700; line-height: 1.15;
  color: var(--foret);
}

.section-h em { font-style: italic; color: var(--vert-clair); }

.reveal {
  opacity: 0; transform: translateY(30px);
  transition: opacity 0.7s ease, transform 0.7s ease;
}
.reveal.visible { opacity: 1; transform: none; }

/* ════════════════════════════
   MISSION
════════════════════════════ */
#mission { background: var(--creme); }

.mission-grid {
  display: grid; grid-template-columns: 1.1fr 0.9fr;
  gap: 80px; align-items: start;
}

.mission-lead {
  font-size: 1.15rem; line-height: 1.85;
  color: #3d4a40; margin: 28px 0 36px;
  font-weight: 300;
  border-left: 3px solid var(--or);
  padding-left: 24px;
}

.mission-body p {
  font-size: 0.97rem; line-height: 1.9; color: var(--gris);
  margin-bottom: 18px; font-weight: 300;
}

.valeurs {
  display: grid; grid-template-columns: 1fr 1fr; gap: 14px;
  margin-top: 40px;
}

.valeur {
  background: var(--blanc);
  border: 1px solid rgba(197,151,58,0.2);
  border-top: 3px solid var(--or);
  padding: 22px 20px; border-radius: 2px;
  transition: box-shadow 0.3s, transform 0.3s;
}
.valeur:hover { box-shadow: 0 10px 36px rgba(14,42,28,0.1); transform: translateY(-3px); }

.valeur-icon {
  font-size: 1.5rem; margin-bottom: 12px; display: block;
}

.valeur h4 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.05rem; font-weight: 700; color: var(--foret);
  margin-bottom: 6px;
}
.valeur p { font-size: 0.82rem; color: var(--gris); line-height: 1.6; }

.mission-visual { position: relative; }

.big-stat-card {
  background: var(--foret); border-radius: 6px;
  padding: 52px 44px; position: relative; overflow: hidden;
  margin-bottom: 16px;
}

.big-stat-card::before {
  content: '';
  position: absolute; bottom: -40px; right: -40px;
  width: 180px; height: 180px;
  background: var(--or); opacity: 0.08;
  clip-path: polygon(50% 0%, 100% 38%, 82% 100%, 18% 100%, 0% 38%);
}

.big-stat-card::after {
  content: '';
  position: absolute; top: -20px; left: -20px;
  width: 100px; height: 100px;
  background: var(--vert-clair); opacity: 0.15;
  clip-path: polygon(50% 0%, 100% 38%, 82% 100%, 18% 100%, 0% 38%);
}

.big-pct {
  font-family: 'Cormorant Garamond', serif;
  font-size: 6rem; font-weight: 700; color: var(--or);
  line-height: 1; display: block; position: relative; z-index: 1;
}

.big-pct-label {
  font-size: 0.95rem; color: rgba(255,255,255,0.8);
  line-height: 1.6; margin-top: 14px; position: relative; z-index: 1;
}

.big-pct-sub {
  font-size: 0.75rem; letter-spacing: 2px; text-transform: uppercase;
  color: var(--or); opacity: 0.75; margin-top: 6px;
  position: relative; z-index: 1; display: block;
}

.image-cards-row {
  display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
}

.img-card {
  border-radius: 4px; overflow: hidden;
  aspect-ratio: 4/3; position: relative;
}

.img-scene {
  width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 10px;
}

.img-scene .scene-labo {
  background: linear-gradient(145deg, #1e4060 0%, #0f2535 100%);
}

.iscene-labo { background: linear-gradient(145deg, #1e4060 0%, #0f2535 100%); width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 10px; }
.iscene-info { background: linear-gradient(145deg, #3a4e28 0%, #1e2c10 100%); width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 10px; }

.img-card-caption {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: linear-gradient(to top, rgba(0,0,0,0.65), transparent);
  padding: 20px 12px 8px;
  font-size: 9px; letter-spacing: 2px; text-transform: uppercase;
  color: rgba(255,255,255,0.85); font-weight: 600;
}

/* ════════════════════════════
   FILIÈRES
════════════════════════════ */
#filieres { background: var(--blanc); }

.filieres-header { text-align: center; max-width: 680px; margin: 0 auto 70px; }
.filieres-header .section-h { margin-top: 12px; }
.filieres-header p { color: var(--gris); font-size: 1rem; line-height: 1.75; margin-top: 18px; font-weight: 300; }

.filieres-grid {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 22px;
  margin-bottom: 70px;
}

.filiere-card {
  border-radius: 5px; overflow: hidden;
  border: 1px solid #e8e5de;
  transition: transform 0.3s, box-shadow 0.3s, border-color 0.3s;
}
.filiere-card:hover {
  transform: translateY(-8px);
  box-shadow: 0 24px 60px rgba(14,42,28,0.13);
  border-color: var(--or);
}

.fc-head {
  padding: 32px 28px;
  position: relative; overflow: hidden;
}

.fc-head.tech { background: linear-gradient(135deg, var(--foret) 0%, #0a1e12 100%); }
.fc-head.gen { background: linear-gradient(135deg, var(--vert) 0%, #0e2a1c 100%); }
.fc-head.anglo { background: linear-gradient(135deg, #1a3a5a 0%, #0e2035 100%); }

.fc-head::after {
  content: '';
  position: absolute; bottom: -24px; right: -24px;
  width: 80px; height: 80px;
  background: var(--or); opacity: 0.15;
  clip-path: polygon(50% 0%, 100% 38%, 82% 100%, 18% 100%, 0% 38%);
}

.fc-icon {
  width: 52px; height: 52px; background: rgba(197,151,58,0.15);
  border-radius: 4px; display: flex; align-items: center; justify-content: center;
  font-size: 1.6rem; margin-bottom: 16px;
  border: 1px solid rgba(197,151,58,0.3);
}

.fc-head h3 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.25rem; font-weight: 700; color: var(--blanc);
  line-height: 1.3; position: relative; z-index: 1;
}

.fc-sub {
  font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
  color: var(--or); font-weight: 600; margin-top: 5px;
  position: relative; z-index: 1;
}

.fc-body { padding: 24px 28px; }

.fc-body ul { list-style: none; }
.fc-body li {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 9px 0; font-size: 0.88rem; color: #3d4040;
  border-bottom: 1px solid #f0ede6;
  line-height: 1.4;
}
.fc-body li:last-child { border-bottom: none; }
.fc-body li::before {
  content: '';
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--or); flex-shrink: 0; margin-top: 6px;
}

.filiere-cta { text-align: center; }
.filiere-cta p {
  font-size: 1rem; color: var(--gris); margin-bottom: 28px;
  font-weight: 300; line-height: 1.7;
}

/* ════════════════════════════
   VIE SCOLAIRE
════════════════════════════ */
#vie {
  background: var(--foret);
  padding: 110px 5%;
}

.vie-inner { max-width: 1280px; margin: 0 auto; }

.vie-top {
  display: grid; grid-template-columns: 1fr 1fr; gap: 80px;
  align-items: center; margin-bottom: 70px;
}

.vie-text .section-h { color: var(--blanc); }
.vie-text .section-h em { color: var(--or); }
.vie-text .tag span { color: var(--or); }

.vie-desc {
  font-size: 1rem; color: rgba(255,255,255,0.62);
  line-height: 1.85; margin: 28px 0 0; font-weight: 300;
}

.vie-highlight {
  background: rgba(197,151,58,0.1); border: 1px solid rgba(197,151,58,0.2);
  border-radius: 4px; padding: 20px 24px; margin-top: 28px;
  display: flex; align-items: center; gap: 16px;
}
.vie-highlight span { font-size: 1.6rem; }
.vie-highlight p {
  font-size: 0.88rem; color: rgba(255,255,255,0.75); line-height: 1.6;
}
.vie-highlight strong { color: var(--or-pale); }

.photos-mosaic {
  display: grid;
  grid-template-columns: 2fr 1fr;
  grid-template-rows: 1fr 1fr;
  gap: 10px;
  height: 380px;
}

.mosaic-item {
  border-radius: 4px; overflow: hidden; position: relative;
}
.mosaic-item:first-child { grid-row: 1 / 3; }

.mscene {
  width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 10px;
}

.ms1 { background: linear-gradient(145deg, #2e5a3e, #174730); }
.ms2 { background: linear-gradient(145deg, #4a7c5a, #2d5e3a); }
.ms3 { background: linear-gradient(145deg, #c5973a, #8a6520); }
.ms4 { background: linear-gradient(145deg, #3a5e7a, #1e3a50); }
.ms5 { background: linear-gradient(145deg, #6a4a2a, #3a2810); }

.mosaic-label {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: linear-gradient(to top, rgba(0,0,0,0.7), transparent);
  padding: 20px 14px 8px;
  font-size: 9px; letter-spacing: 2px; text-transform: uppercase;
  color: rgba(255,255,255,0.85); font-weight: 600;
}

.mosaic-emoji { font-size: 2rem; opacity: 0.85; }
.mosaic-icon-label { font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: rgba(255,255,255,0.5); font-weight: 500; }

/* Extra activities strip */
.activites-strip {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px;
  margin-top: 0;
}

.activite-card {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 4px; padding: 24px 20px;
  text-align: center;
  transition: background 0.3s, border-color 0.3s;
}
.activite-card:hover {
  background: rgba(197,151,58,0.1);
  border-color: rgba(197,151,58,0.3);
}
.activite-card .act-icon { font-size: 1.8rem; margin-bottom: 12px; }
.activite-card h4 {
  font-size: 0.9rem; color: rgba(255,255,255,0.85);
  font-weight: 500; margin-bottom: 6px;
}
.activite-card p {
  font-size: 0.78rem; color: rgba(255,255,255,0.42);
  line-height: 1.5;
}

/* ════════════════════════════
   INSCRIPTION
════════════════════════════ */
#inscription { background: var(--creme); }

.inscription-inner {
  max-width: 1100px; margin: 0 auto;
}

.inscription-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: center;
}

.etapes { margin-top: 40px; }

.etape {
  display: flex; gap: 20px; margin-bottom: 32px; align-items: flex-start;
}

.etape-num {
  width: 40px; height: 40px; border-radius: 50%;
  background: var(--foret); color: var(--or);
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.1rem; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}

.etape-content h4 {
  font-size: 1rem; font-weight: 600; color: var(--foret);
  margin-bottom: 4px;
}
.etape-content p { font-size: 0.86rem; color: var(--gris); line-height: 1.65; font-weight: 300; }

.inscription-form-card {
  background: var(--foret); border-radius: 6px;
  padding: 50px 44px; position: relative; overflow: hidden;
}

.inscription-form-card::before {
  content: '';
  position: absolute; top: -60px; right: -60px;
  width: 200px; height: 200px;
  background: var(--or); opacity: 0.07;
  clip-path: polygon(50% 0%, 100% 38%, 82% 100%, 18% 100%, 0% 38%);
}

.form-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.8rem; font-weight: 700; color: var(--blanc);
  margin-bottom: 8px;
}
.form-sub {
  font-size: 0.85rem; color: rgba(255,255,255,0.5);
  margin-bottom: 32px;
}

.form-group { margin-bottom: 18px; }
.form-group label {
  display: block; font-size: 11px; letter-spacing: 1.5px;
  text-transform: uppercase; color: var(--or);
  font-weight: 600; margin-bottom: 7px;
}
.form-group input,
.form-group select,
.form-group textarea {
  width: 100%; padding: 13px 16px;
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 3px;
  color: rgba(255,255,255,0.9);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.9rem;
  transition: border-color 0.25s, background 0.25s;
  outline: none;
}
.form-group input::placeholder { color: rgba(255,255,255,0.3); }
.form-group input:focus,
.form-group select:focus,
.form-group textarea:focus {
  border-color: var(--or);
  background: rgba(255,255,255,0.1);
}
.form-group select { cursor: pointer; }
.form-group select option { background: var(--foret); color: var(--blanc); }

.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

.btn-form {
  width: 100%; padding: 15px;
  background: var(--or); color: var(--foret);
  font-size: 12px; letter-spacing: 2px; text-transform: uppercase;
  font-weight: 700; border: none; border-radius: 3px; cursor: pointer;
  transition: background 0.3s, transform 0.2s;
  font-family: 'DM Sans', sans-serif;
  margin-top: 8px;
}
.btn-form:hover { background: var(--or-vif); transform: translateY(-1px); }

/* ════════════════════════════
   CONTACT
════════════════════════════ */
#contact { background: var(--blanc); }

.contact-header { text-align: center; max-width: 560px; margin: 0 auto 70px; }
.contact-header .section-h { margin-top: 12px; }

.contact-grid {
  display: grid; grid-template-columns: 1fr 1.4fr; gap: 60px; align-items: start;
}

.contact-infos { }

.contact-item {
  display: flex; align-items: flex-start; gap: 18px;
  padding: 22px 0; border-bottom: 1px solid #edebe3;
}
.contact-item:first-child { padding-top: 0; }
.contact-item:last-child { border-bottom: none; }

.c-icon {
  width: 46px; height: 46px;
  background: var(--creme); border: 1px solid var(--or);
  border-radius: 3px; display: flex; align-items: center; justify-content: center;
  font-size: 1.1rem; flex-shrink: 0;
}

.contact-item-text label {
  font-size: 10px; letter-spacing: 2.5px; text-transform: uppercase;
  color: var(--or); font-weight: 600; display: block; margin-bottom: 4px;
}
.contact-item-text p { color: #3d3d35; font-size: 0.92rem; line-height: 1.6; }
.contact-item-text a { color: #3d3d35; text-decoration: none; }
.contact-item-text a:hover { color: var(--vert-clair); text-decoration: underline; }

.map-wrap {
  border-radius: 6px; overflow: hidden;
  border: 2px solid var(--or);
  box-shadow: 0 20px 60px rgba(14,42,28,0.1);
  position: relative;
}

.map-wrap iframe {
  width: 100%; height: 420px; border: none; display: block;
}

.map-wrap-header {
  background: var(--foret); padding: 14px 20px;
  display: flex; align-items: center; gap: 10px;
}
.map-wrap-header span { font-size: 0.85rem; color: rgba(255,255,255,0.7); }
.map-wrap-header strong { color: var(--or); font-size: 0.85rem; }
.map-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--or); flex-shrink: 0;
  box-shadow: 0 0 0 3px rgba(197,151,58,0.3);
  animation: pulse 2s ease infinite;
}
@keyframes pulse {
  0%, 100% { box-shadow: 0 0 0 3px rgba(197,151,58,0.3); }
  50% { box-shadow: 0 0 0 6px rgba(197,151,58,0.1); }
}

/* ════════════════════════════
   FOOTER
════════════════════════════ */
footer {
  background: var(--foret);
  border-top: 1px solid rgba(197,151,58,0.2);
  padding: 80px 5% 0;
}

.footer-main {
  max-width: 1280px; margin: 0 auto;
  display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: 60px;
  padding-bottom: 60px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}

.footer-brand .logo { margin-bottom: 20px; }

.footer-brand p {
  font-size: 0.875rem; color: rgba(255,255,255,0.45);
  line-height: 1.8; max-width: 280px;
}

.footer-socials {
  display: flex; gap: 10px; margin-top: 24px;
}

.social-btn {
  width: 38px; height: 38px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 3px; display: flex; align-items: center; justify-content: center;
  font-size: 0.9rem; text-decoration: none; transition: all 0.25s;
}
.social-btn:hover { background: rgba(197,151,58,0.15); border-color: var(--or); }

.footer-col h4 {
  font-size: 10px; letter-spacing: 3px; text-transform: uppercase;
  color: var(--or); font-weight: 600; margin-bottom: 20px;
}
.footer-col ul { list-style: none; }
.footer-col li { margin-bottom: 10px; }
.footer-col a {
  font-size: 0.875rem; color: rgba(255,255,255,0.45);
  text-decoration: none; transition: color 0.25s;
}
.footer-col a:hover { color: var(--or-pale); }

.footer-bottom {
  max-width: 1280px; margin: 0 auto;
  display: flex; align-items: center; justify-content: space-between;
  padding: 24px 0;
}

.footer-bottom span { font-size: 0.8rem; color: rgba(255,255,255,0.3); }
.footer-bottom a { color: rgba(255,255,255,0.3); text-decoration: none; }
.footer-bottom a:hover { color: var(--or); }

/* ════════════════════════════
   RESPONSIVE
════════════════════════════ */
@media (max-width: 1024px) {
  .hero-inner { grid-template-columns: 1fr; }
  .hero-right { display: none; }
  .mission-grid { grid-template-columns: 1fr; }
  .filieres-grid { grid-template-columns: 1fr 1fr; }
  .footer-main { grid-template-columns: 1fr 1fr; gap: 40px; }
  .vie-top { grid-template-columns: 1fr; }
  .inscription-grid { grid-template-columns: 1fr; }
  .contact-grid { grid-template-columns: 1fr; }
}

@media (max-width: 768px) {
  .nav-links { display: none; }
  .nav-links.open {
    display: flex; flex-direction: column;
    position: absolute; top: 76px; left: 0; right: 0;
    background: rgba(14,42,28,0.99);
    padding: 20px 5%; gap: 20px;
  }
  .nav-hamburger { display: flex; }
  .filieres-grid { grid-template-columns: 1fr; }
  .activites-strip { grid-template-columns: 1fr 1fr; }
  .footer-main { grid-template-columns: 1fr; gap: 40px; }
  .hero-stats { gap: 24px; }
  .valeurs { grid-template-columns: 1fr; }
  .image-cards-row { grid-template-columns: 1fr; }
  .form-row { grid-template-columns: 1fr; }
}
</style>
